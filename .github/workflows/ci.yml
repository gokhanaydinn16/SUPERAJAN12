name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

jobs:
  python-real-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Verify installed dependency lane
        run: |
          python - <<'PY'
          from pathlib import Path
          import fastapi
          import httpx
          import pydantic
          import pytest

          for module in (pydantic, fastapi, httpx, pytest):
              path = Path(module.__file__).resolve()
              if "/src/" in path.as_posix():
                  raise SystemExit(f"expected installed dependency, got repo shim: {module.__name__} -> {path}")
              print(f"{module.__name__}: {path}")
          PY

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q -o pythonpath=

  python-runtime-compat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify repository compatibility lane
        run: |
          PYTHONPATH=src python - <<'PY'
          from pathlib import Path
          import fastapi
          import httpx
          import pydantic
          import pytest

          for module in (pydantic, fastapi, httpx, pytest):
              path = Path(module.__file__).resolve()
              if "/src/" not in path.as_posix():
                  raise SystemExit(f"expected repo compatibility module, got installed dependency: {module.__name__} -> {path}")
              print(f"{module.__name__}: {path}")
          PY

      - name: Runtime compatibility test
        run: PYTHONPATH=src python -m pytest -q

  desktop-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install desktop dependencies
        run: npm install

      - name: Build desktop web UI
        run: npm run build

  desktop-tauri-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: npm install

      - name: Cargo check desktop shell
        run: cargo check --manifest-path src-tauri/Cargo.toml
