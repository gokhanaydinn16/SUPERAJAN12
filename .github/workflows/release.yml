name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version without v prefix, for example 0.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-compliance:
    runs-on: ubuntu-latest
    outputs:
      target_version: ${{ steps.meta.outputs.target_version }}
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "target_version=${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
            echo "name=SuperAjan12 v${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
          else
            target_version="${GITHUB_REF_NAME#v}"
            echo "target_version=${target_version}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=SuperAjan12 ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release surface parity and changelog
        env:
          TARGET_VERSION: ${{ steps.meta.outputs.target_version }}
        run: bash scripts/release-compliance.sh

  build-python:
    runs-on: ubuntu-latest
    needs:
      - release-compliance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python artifacts
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-desktop-web:
    runs-on: ubuntu-latest
    needs:
      - release-compliance
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build desktop web artifact
        run: npm run build

      - name: Upload desktop web artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-web-dist
          path: apps/desktop/dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - release-compliance
      - build-python
      - build-desktop-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-assets/python-dist

      - name: Download desktop web artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-web-dist
          path: release-assets/desktop-web-dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-compliance.outputs.tag }}
          name: ${{ needs.release-compliance.outputs.name }}
          body: |
            Release notes are maintained in `CHANGELOG.md`.

            Included artifacts:
            - Python sdist and wheel
            - Desktop web build artifact

            Desktop bundles remain intentionally disabled until release-grade desktop packaging inputs are committed.
          files: |
            release-assets/python-dist/*
            release-assets/desktop-web-dist/**
          generate_release_notes: false
